<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Deals | Premium Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="flash-bar">
    ⚡ FLASH SALE ENDS IN: <span id="timer">00h 00m</span>
</div>

<header>
    <h1>🔥 APEX DEALS KE</h1>
    <input type="text" class="search-box" placeholder="Search 200+ top deals..." oninput="handleSearch(this.value)">
</header>

<div class="nav-cats">
    <div class="cat-chip active" onclick="filterCat('All', this)">All</div>
    <div class="cat-chip" onclick="filterCat('Electronics', this)">Electronics</div>
    <div class="cat-chip" onclick="filterCat('Fashion', this)">Fashion</div>
    <div class="cat-chip" onclick="filterCat('Home', this)">Home Decor</div>
</div>

<div id="products"></div>

<div id="cart-trigger" onclick="openCart()">
    🛒 Cart (<span id="cart-count">0</span>)
</div>

<div id="cartModal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0">Order Summary</h2>
        <div id="cart-list" style="margin-bottom:20px"></div>
        
        <div class="input-group">
            <label>Your Name</label>
            <input type="text" id="name" placeholder="John Doe">
        </div>
        <div class="input-group">
            <label>Delivery Area / Shop Name</label>
            <input type="text" id="loc" placeholder="Nairobi, Tom Mboya St.">
        </div>

        <h3 style="display:flex; justify-content:space-between">
            <span>Total:</span>
            <span>KSh <span id="total-amt">0</span></span>
        </h3>
        
        <button class="whatsapp-btn" onclick="sendWhatsApp()">Complete via WhatsApp</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
