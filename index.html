<!DOCTYPE html>
<html>
<head>
  <title>Apex Deals KE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
  <h1>🔥 Apex Deals KE</h1>
  <input type="text" id="search" placeholder="Search products..." onkeyup="searchProducts()">
</header>

<!-- CATEGORIES -->
<div id="categories">
  <button onclick="filterCategory('All')">All</button>
  <button onclick="filterCategory('Electronics')">Electronics</button>
  <button onclick="filterCategory('Fashion')">Fashion</button>
  <button onclick="filterCategory('Home')">Home</button>
</div>

<!-- PRODUCTS -->
<div id="products"></div>

<!-- CART BUTTON -->
<div id="cartBtn" onclick="openCart()">
  🛒 Cart (<span id="cartCount">0</span>)
</div>

<!-- CART MODAL -->
<div id="cartModal" class="modal">
  <div class="modal-content">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <h3 id="total"></h3>
    <button onclick="checkout()">Checkout via WhatsApp</button>
    <button onclick="closeCart()">Close</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
